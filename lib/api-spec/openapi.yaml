          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pipeline"

  /pipelines/{id}:
    get:
      operationId: getPipeline
      tags: [pipelines]
      summary: Get pipeline with stages
      parameters:
        - name: id
          in: path
          required: true
