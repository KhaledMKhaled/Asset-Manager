        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pipeline"
    delete:
      operationId: deletePipeline
      tags: [pipelines]
      summary: Delete pipeline
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
