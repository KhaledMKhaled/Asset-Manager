    patch:
      operationId: updatePipeline
      tags: [pipelines]
      summary: Update pipeline
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePipelineBody"
